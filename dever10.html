<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <label for="">Digite seu nome</label>
    <input type="text" id="nome"></input>


  <label for="">Digite o primeiro</label>
    <input type="number" id="primeiro"></input>

    <label for="">Digite o segundo</label>
    <input type="number" id="segundo"></input>

    <label for="">Digite o terceiro</label>
    <input type="number" id="terceiro"></input>

    <button onclick="mostrar()">mostrar</button>

    <p id="resultado"></p>

    <script>
        function mostrar() {
            
            const nome = document.getElementById("nome").value
            const primeiro = document.getElementById("primeiro").value
            const segundo = document.getElementById("segundo").value
            const terceiro = document.getElementById("terceiro").value
            

            document.getElementById("resultado").innerHTML = " Bem vindo "+nome+ " numero "+primeiro+ " numero "+segundo+ " numero "+terceiro;
        }
        
    </script>























</body>
</html>
